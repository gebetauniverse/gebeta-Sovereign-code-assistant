name: Test Suite

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-fastapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          cd templates/fastapi-service-template
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests with coverage
        run: |
          cd templates/fastapi-service-template
          pytest tests/ -v --cov=app --cov-report=xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: templates/fastapi-service-template/coverage.xml
          flags: fastapi

  test-react:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: |
          cd templates/react-frontend-template
          npm ci
      - name: Run tests with coverage
        run: |
          cd templates/react-frontend-template
          npm run test -- --coverage

  test-springboot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Run tests with coverage
        run: |
          cd templates/springboot-service-template
          ./mvnw test jacoco:report
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: templates/springboot-service-template/target/site/jacoco/jacoco.xml
          flags: springboot
